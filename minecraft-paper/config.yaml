name: "Minecraft Paper Server"
description: "A highly performant, production-ready Minecraft server using PaperMC."
version: 1.0.0
slug: minecraft_paper
init: false
arch:
  - aarch64
  - amd64
startup: application
boot: auto
map:
  - config:rw
  - share:rw
  - ssl:rw
  - addons_config:rw
ports:
  25565/tcp: 25565
  25575/tcp: 25575
ports_description:
  25565/tcp: "Minecraft Server Port"
  25575/tcp: "RCON Port (For external RCON clients)"
options:
  accept_eula: false
  server_version: "latest"
  memory_min: "2G"
  memory_max: "4G"
  motd: "A Minecraft Server powered by Home Assistant"
  rcon_password: "ChangeMePlease"
schema:
  accept_eula: bool
  server_version: str
  memory_min: str
  memory_max: str
  motd: str
  rcon_password: password
